version: 2

project_name: mmrun

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/isdmx/mmrun/internal/version.Version={{ .Version }}
      - -X github.com/isdmx/mmrun/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/isdmx/mmrun/internal/version.Date={{ .Date }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  draft: false
  prerelease: auto

brews:
  - name: mmrun
    repository:
      owner: isdmx
      name: homebrew-tap
      token: "{{ .Env.TAP_TOKEN }}"
    homepage: "https://github.com/isdmx/mmrun"
    description: "Scriptable Mattermost CLI client"
    license: "MIT"

